front:
  text: 地祇上將溫太保傳孝九
  hash: sha256:57dd1c7a79b96ec022d6ee008b0e15cbe201f799a41bf4ec9f84ec0763ffe151
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0176_HFL_000-001a, image: hfl/0557/0557-136.png}
body:
  text: 天一靖牧羊遺竪黃公瑾校正太保姓溫名瓊字子玉乳名卓郎溫州平陽縣人母夫人張氏嘗夢南方日輪大如車其聲如雷寤而有娠遂生太保身長九尺二寸長大有志武勇敢為時唐朝羣盜蜂起隨汾陽郭子儀出戰身為先鋒白刃未嘗傷體子儀嘗夢前軍有黑霧覺而問軍中夜來前軍有甚事監軍曰夜來只有校尉溫瓊大醉身中酒氣有如黑霧子儀即拜瓊為帳前準備將一日子儀與賊封壘賊見軍中有黑霧沖沖狀成龍蛇羣盜驚走瓊請步卒一千人追之殺賊數千餘人而瓊兵不失一卒未幾拜瓊為帳前都檢點子儀嘗與同宿又夢其變黑蛇而生一角知其為異人也然終疑其為患欲殺之瓊覺其意遂逃歸岱山下屠牛賣酒一日炳靈公化為道人語瓊曰觀子之相骨氣通神他日必有香火萬世豈可冒法宰牛深犯天律瓊曰如此則我不若歸山修道恐有人度我成仙道人曰君無仙骨豈可強修瓊欲再問不知所在而失去矣瓊奇之自是不殺只出入東嶽廟為化主打供精進三年忽一日嶽峰遇黃衣蓬頭道者長揖瓊曰今日嶽帝書上汝名若天年終則為嶽府太保汝可立像於殿前身後當任其職瓊如其言立像於嶽府自此諸太保時復來訪瓊一日殿前太保灌丘休語瓊曰汝像若變則歸職矣瓊日至像前觀之有少年孟雲笑之曰汝日日來觀此像恐人盜去乎瓊曰灌將軍報我像變則為神我若為神汝亦為我卒矣其後孟雲同韋彥以青色塗其像口裝二豬牙一日溫瓊來燒香只見其像已變即更青衣青巾麻鞋唯有平時殺牛鐵棒頭持至殿下遂立化矣孟韋來觀方欲頂禮亦皆立化至五月初九日勑下肉身不倒亦不變動勑封顯德大將軍市民欲立廟村主姚子正亦欲立廟瓊告子正曰吾受命東嶽正欲立大功勳去世大害扶持正道安敢忘上帝好生之德而遽欲血食不施仁濟之心乎苟受國封實為我德之纍汝等若立廟我焚之子正乃止明年子正亦歸嶽府作太保一日炳靈公奏嶽帝曰溫瓊自去年三月十五日歸充太保有功可賞帝曰如何公曰不受民間廟食一也不以國封為榮二也在我無纖毫過失三也合受緊要職事嶽帝遂詔為地府冥司急取人案大典者人之生死皆由所掌至皇朝藝祖登極次年溫州大旱有昊思敬者詣嶽祠祈禱是夕有旗見雲端上有溫瓊二字雨迅風飛民卒免旱昊思敬欲祠之有百姓王九二附體曰吾誓在正直濟民終有宗師收吾入道法會下為吏不以廟祀國封為重汝欲報吾功德幸勿保奏朝廷若能為吾奏名於玄帝闕下則天神地祇俱歸敬矣於是衆從其言設醮謝天具奏玄帝保明子玉功行至嗣天師虛靖先生時有許溫郝邊者天下國封神祇皆畏之興行三壇之教雖未甚流行而瓊甚怒之不得上命不敢馘伐宣和年間虛靖遊東嶽炳靈公郊迎虛靖至嶽府問帝曰嶽府諸神誰冠羣靈帝曰近王祀保明溫瓊可任虛靖曰昨者考校仙官過我籍中有溫瓊者不求血食降雨溫州不以國封為榮志欲扶持宗教為先虛靖之來正為是爾莫非此人乎帝曰是也至是嶽帝召至溫瓊面聖再拜頓首言曰臣經年在職無由面對天顔今承呼召得至丹墀虛靖曰此溫瓊乎帝曰是也虛靖曰向者溫州百姓保奏汝於天廷云有救旱之功不以廟食國封為榮而有歸依正道扶持宗師之志吾面對嶽帝為汝作地祇一司正法符篆呪訣謂瓊曰汝化於三月十五日寅時此為木老火初之節故木生火火旺於丙丁鬼為萬物之靈者故只此篆為汝真形足矣虛靖作其符為丙丁生鬼四字以應其時而成真篆然後又以雲篆而書晝諸符地祇一司之法蓋始於此虛靖教主曰地祇之神奉命玉清是謂靈寶侍衛送迎之官故度人經中有勑制地祇侍衛送迎之語又謂弟子曰法部至靈無出溫瓊一日虛靖入川至青城山山背有大溪洞虛靖以為洞中必有仙境欲入觀看不知洞中乃漢祖天師滅伐魔鬼之所餘黨結連萬衆居此立廟出入洞中或行瘟疫時氣以害民或飛霆烈風以求血食國封曰顯濟廟神曰靈祐普利廣德博濟王民稱曰慈利大帝四川居民香火畢集虛靖不知魔鬼所居而其妖先知虛靖之來遂領鬼衆欲害虛靖以報祖天師舊日滅翦之讎虛靖携弟子三十人同進只見怪風迅起山色昏沈黑暗無路虛靖驚怪間見一人青面皂袍鐵甲持槌有黑旗黑馬飛走在前以當其鋒瞬息朗明虛靜進觀顯濟廟以成灰燼洞中醜形皆死須臾怪風又作方欲叩齒只見青面下馬躬身至虛靖前曰瓊在此為天師法主滅害人之魔去亂教之鬼共數千衆今生捉到拒逆侵凌天師五兵魔王慈利大帝以聽法旨虛靖曰欲害嗣教人命者當死何况領衆魔來戰當準酆都嚴刑黑律處斬於是溫瓊遵命斬妖魔於青華觀左山斬畢但見水枯草死血滴處石為之透至今此山有石如丹虛靖保奏瓊為助法翊靈昭武大使太保以酆都肅殺馬黑馬三千人付統領以聽驅使其三千兵首則有正薛真徐汴薛徐謂瓊曰汝前身是人強勇者我乃冥司之猛將遇降禍福則羣鴉亂飛輕則惡事橫生重則滅門殺戮遊行天下無敢干犯者祀典神祇亦皆迎送汝欲節制我須有神通出於吾之上者則可瓊曰我就岱山西城一戰薛徐於是列兵前陳瓊登黑馬挺身直奔薛徐之營薛徐開陳當前萬箭俱發群鎗兼舉瓊只疾聲一呼變為黑蛇長千百丈以尾束薛徐二將更不能變化羣卒皆奔四圍火起不得出圍羣呼拜將軍叩首乞命望赦其罪甘伏節制不敢違旨其黑蛇發聲曰吾受命東嶽管掌汝等為天下嗣教宗師護持法門救度衆生寧解今日為下鬼所苦耳聞經聽旨受其超鍊具足神通汝等敢拒逆正直之心本欲食汝等但以祖師好生之心故權恕汝薛徐俯伏悉歸麾下真宗朝有道流王宗敬至青城遊天寶洞見虛靖虛靖曰汝之遊山為何宗敬答曰投師學法濟物祛妖虛靖曰吾即昔日張虛靖汝曾聞名乎宗敬曰求師十年不得一見今日得見天師再拜願受祕法於是分獨體地祇溫太保祕法一階付之其宗敬專志一念奉祀玄帝行法立功於世顯應甚多其在衡門洛水濟人但念太陰化生呪及丙丁生鬼符用驅邪院印一顆無不感應其潭湖江河之民來求水者日以數千計一日宗敬夜卧忽聞人聲云真官可出户來有事稟聞及出乃見瓊下馬躬身而進宗敬遂與太保坐法壇中瓊曰昨奉虛靖天師差瓊護持真官修奉玄帝香火濟民苦厄今真官功德甚重玄帝已書名仙籍得為玄帝闕下主掌秦境人民香火靈官而瓊準玄帝牒回嶽府而虛靖天師以為傳人有功位登真人吾敬來告君君即瓊之像毋留於世若後人因而立廟又纍我德宗敬如其言遂授印與玄帝像與昊道顯宗敬又以龍虎籙文皆列平日所用條式一百九十七件流傳於世故得其正傳者昊道顯一人耳宗敬又謂道顯汝可過福建乃不奉正道妖邪魔鬼之所道顯至福建路有金繭蠱毒之神名曰伽羅王閩人敬仰之又人家多養金繭收人魂魄役使工作途中商旅受害妖神聞宗師來相與告曰我等仗佛為主來則殺之勿令居此居此則無我也道顯至泉州施符水有驗然四方果妖道崇佛甚衆奈所行正道不振道顯以鏡一面誦丙丁之呪布氣鏡中持鍊九年其鏡通神瓊現身出入鏡中而持鍊不輟又加之天蓬呪道顯曰誦此呪以助威靈鍊此鏡願承此呪力如此又三年其鏡愈通神置之之所自有白氣沖沖一日太保以鏡中奔出語道顯曰君受宗師正傳承受天師流教且君居此少人皈崇香火此有閩縣僧伽山是泗洲所建之地左山有金光洞有一廟神曰伽嘍王君可親往伐之道顯如其言至廟見殿閣宏麗四方誦金剛經來朝者萬數其容貌如常神後宫夫人及親王三百餘位左殿丞相十二員右殿太尉五十七位五猖瘟司等衆甚多四顧觀望心內驚怖不敢作用出廟登其左山有亭曰羅漢行道壇四無人聲遂東望叩齒密奏嶽帝取出所鍊之鏡叱云吾在此汝急報應太保忽自鏡中持大武槌先鋒而出雷電風雨從後四山皆黑瞬息之間霹靂一聲廟中火發四山皆焚少頃天氣朗清則見伽嘍王已成灰矣惟存一大柱不曾燒大書其上云溫瓊順天助法奉命剪馘妖魔訖道顯驚悚方省悟中太保至前聲喏曰瓊今滅邪訖瓊本不能勝此邪荷宗師修鍊之功得天蓬大呪之力瓊受鍊六通具足無報宗師呪鍊之功誓立大願自今日始永為嗣法之師廣施大利普濟世人望君莫居於此可入川中修鍊至真丙午君當尸解矣然此地衆生皆背道向佛之人天道惡之幸隨瓊所請道顯曰佛非正道而太保何不滅之瓊曰佛有大覺之功一念衆生為善佛有蔽邪之罪一本慈悲為心故太上留此教以化愚民體真師順天之德不忍滅之故不能斷其教也於是道顯坐太保之馬瓊把節引導駕黑雲而去瞬息之間已至西蜀青城山太保又惠白金百兩令入川施符水道顯入城都營訖思瓊有恩於我我當保奏於是奏嶽帝神炳靈公七日之內奏詞達帝帝曰瓊可謂舉世衆生蒙大利益大振正道宗風即下詔特拜為四海都巡九州檢察使依前助法翊靈昭武大太保掌地府冥司急取人案大典者太保自得道顯天蓬呪所鍊之功備足六通能升天入地上中下三界神祇並皆敬畏不敢干犯道顯所傳度弟子五百三十二人得其傳而靈驗者百餘人心與行違者百餘人無應無聞犯天律而為太保擊死者二百餘人修真奉聖持鍊修崇香火蒙太保奏嶽帝得道成真而歸玄都右勝院充典吏靈官者五十三人合元和遷校府五百靈官中任職位而升進右勝府靈官亦五十三人自後太保及十地祇之書散流天下崇其法甚多而人人以為地祇為正法之下品乃人間之神奉法者必兼他司之法自此而不聞應矣且末學亦知其為捷諸司而不能專心敬崇者十有八九太保在嶽府嘗謂鐵勝曰吾欲立功護持宗教奈今天下修法者甚多而並無此仙骨可謂惡毒之世矣太保一念護持正道期天和風流布而許溫郝邊興妖教於世助三壇僧伽之道護持佛教金剛憚其妖風甚盛國立憲章以嚴禁制奈聽魔教不能改過壽皇惡之命杜真人作大功德飛奏三天欲永杜絶時東嶽帝君召炳靈公曰以妖道興行民遵釋教世受其害國主忍之汝可遵上帝勑命急為斷絶炳靈公即召合嶽將吏出兵馘伐周滿八紘其奈二妖運其邪力或為五顯靈通或作洞庭怪異黨從數萬以部瘟司不敢攝捉於是五嶽會于天寶洞天僉議此事炳靈公奏曰此非都巡溫瓊不可今溫瓊在青州護佐柳伯期行持濟世可權差張巡代行召往伐之西嶽曰嶽府羣臣不能伏豈可獨任溫瓊乎炳靈曰昔日有地仙昊道顯持天蓬呪數年不止鍊瓊於鏡中瓊受鍊六通備足掌生死案任小判官六十員分掌天下柳君奉法為當今第一階溫瓊所護也諸嶽帝莫不驚駭嶽帝遂飛符召瓊及至奏嶽帝曰許溫郝邊嘗聞臣名而畏若領兵伐之許郝必逃遁有張去疾能往聽察願令與臣同往乃可收功帝從之瓊宣號令立賞罰出師望西而進東至耶尼山一萬九千里二妖聞之相與言曰今嶽府溫瓊來威聲大振不可當也於是釋兵流散許郝化為二蛇藏于浩蕩穴內去疾先往化真形為三歲孩兒拖繡毬開發光明其中二三歲小孩兒嬉戲許郝亦化作小兒入毬遂為去疾抱定無由逃遁良久瓊兵大至西耶尼山震動浩蕩水吼許郝伏罪瓊食其亞副鬼王勦絶佛釋僧伽三十六萬凱還謝帝即拜為提點天下神廟仍前職真賜助法翊靈昭武雄烈太保杜真人奏壽皇曰天下妖風已滅皆溫瓊之功帝曰曾有封乎對曰曾封王而不受帝勑廟食不受國封不從可謂嶽山上將率土威神正真無私神通具足杜真人於是恭奉聖旨保奏三天拜章之夕帝問曰章詞曾達天聽乎對曰至省蒙使相判云人間之神絲毫之德而敢干瀆至尊本欲送左司靈官擬罪又念汝奉法七世權赦一次惟瓊之名頒行天下城隍司照會溫瓊正直曾受宗師正法可特稱地祇上將天下正神部轄羣祇提點宫廟奏詞架閣不敢謄録自此後太保威名震伏羣臣舉皆敬仰果州鍾真人明奉地祇之法最有感應有辰州寓居朝散郎王卿孺除知果州一日過辰溪古寺見右廊門上畫瘟司二字卿孺忘形觀瞻登殿揭簾而入忽有一人如世間院子之狀進揖卿孺曰大王有命請安撫相見卿孺大驚曰王為誰曰康王也勑封威濟善利孚惠英烈王告者力請卿孺不能遜遂行至一殿又傳王旨云請安撫登殿康王俯而揖就座王曰應奉都大城隍委掌瘟司檢察善惡今宿緣會合得遇安撫判官至此應偶有事干瀆威嚴幸望台慈曲賜垂允卿孺曰大王有事見諭可備委令者幸望條示王曰昨奉大城隍司行下天下符牒委令於去年內果州行瘟本州有鍾真人自幼敬奉玄帝香火蒙玄帝親授都大提舉城隍司印仍下東嶽以溫都巡名瓊為役使將奈果州人民過惡甚多而受病者衆其民凶毒不遵應之教化然應初入果州其地三壇洞王元皇洪山等徒崇奉釋教專事打瘟一時為應盡滅其黨千百人果州之邪略盡應初無鍾真人應每行瘟上奉天命鍾真人符法所至即為收攝未嘗敢違而真人以為應苟圖祭祀布瘟果州收禁應之從兵五千人欲飛攝應赴天嶽曲望台慈遇騎從交割果州軍州牌印訖日便為解救亦陰德也卿孺曰當領王命所可疑者王能滅三壇行佛法之人却不能殺鍾真人乎王曰真人有三事不可與爭衡一姓名書於右勝府二能鍊鏡以通神三有嶽府溫都巡為役使聽令將天下神廟無敢犯者况神市有諺曰能捉西天釋迦佛難當東嶽溫都巡卿孺曰不知何以如此康王曰昨昊真人鍊鏡誦天蓬呪萬萬遍加持修鍊而太保承功德備足六通威靈無競卿孺辭退康王遺金五百兩以為執贄之恭卿孺到家則其家已失卿孺三日矣其後交割果州牌之後即問孔目曰此州鍾明真人住在何處孔目對曰鍾真人住在城北次日卿孺造其靖宣告前事真人恭對判官云此鬼自去年流毒於此方若非明所為公直果州之民三分死亡二矣卿孺懇請恕之鍾真人曰固當奉台命但康應見在嶽府充太保當來虛靖天師亦收入地祇十將之第六人而掌瘟不平檢察太過昨令溫瓊收下今當以台旨恕之所收康應吏卒送溫都巡各杖一百放之其後王卿孺保奏鍾真人封為威惠真人朝廷以溫都巡不受國封特賜金錢沈香一斤至如滅池州五顯香火之根本勦安慶挂車大王之吏兵斬通聖小官人逐洞庭劉小一破洪山漢陽之廟燒瘟司牛市之祠專任都巡報應甚亟其他靈異未易枚舉後之人必能搜奇而記之廣其不逮云地祇上將溫太保傳
